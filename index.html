<script>
'use strict';

/* ============================================================
   ⚠️  STRIPE CONFIG  -  replace with your own keys
   Get from https://dashboard.stripe.com/apikeys
   ============================================================ */
/* ============================================================
   CONFIGURATION - Replace all values before going live
   ============================================================ */
const STRIPE_PK           = 'pk_test_YOUR_PUBLISHABLE_KEY';
const STRIPE_PAYMENT_LINK = 'https://buy.stripe.com/YOUR_PAYMENT_LINK';

/* ============================================================
   REGIONAL PRICING (PPP tiers per audit recommendation)
   Create separate Stripe Payment Links for each tier.
   Set STRIPE_PAYMENT_LINK_* in Stripe Dashboard.
   ============================================================ */
const REGIONAL_PRICING = {
  // Tier 1: Developed markets - $1.99
  TIER_1: { price: 1.99, display: '$1.99', countries: ['US','GB','CA','AU','NZ','IE','DE','FR','NL','SE','NO','DK','FI','CH','AT','BE','SG','JP','KR','HK','TW'] },
  // Tier 2: Middle-income markets - $0.99
  TIER_2: { price: 0.99, display: '$0.99', countries: ['BR','MX','AR','CO','CL','PL','CZ','HU','RO','ZA','MY','TH','TR','UA','RS'] },
  // Tier 3: Low-income markets - $0.49
  TIER_3: { price: 0.49, display: '$0.49', countries: ['IN','NG','PK','BD','PH','ID','GH','KE','TZ','UG','ET','EG','MA','TN','VN','MM'] },
};
function getRegionalTier(countryCode){
  for(const [tier, data] of Object.entries(REGIONAL_PRICING)){
    if(data.countries.includes(countryCode)) return { tier, ...data };
  }
  return { tier:'TIER_1', ...REGIONAL_PRICING.TIER_1 };
}
window._pricingTier = getRegionalTier('US'); // updated after geo detection

// Resend API key - for transactional emails (wish pinned, wish granted, receipts)
// Get from resend.com > API Keys. Add to Netlify env vars as RESEND_API_KEY
// The actual sending happens via Netlify functions (see netlify/functions/)
const RESEND_FROM_EMAIL   = 'hello@wishwall.xyz'; // Must be verified in Resend
const PLATFORM_EMAIL      = 'admin@wallwishes.xyz';

/* ============================================================
   PLATFORM CONSTANTS
   ============================================================ */
const PLATFORM_LAUNCH_DATE = new Date('2024-12-15');
const WISHCOIN_USD_RATE    = 1.00;  // 1 WishCoin = $1 USD base rate   // 1 WishCoin = $1 USD  -  base currency is USD
const PLATFORM_FEE_PCT     = 0.05;   // 5% admin fee on each grant (disclosed in ledger)
const WC_PIN_COST          = 1.99;  // Charm pricing: $1.99 not $2.00 (+24% conversion, Manning & Sprott 2009)      // 2 WishCoins to pin a wish = $2 USD
const WALL_CAPACITY        = 1000;   // Fixed: 40 columns x 25 rows = 1,000 stories
const WALL_COLS            = 40;     // Grid columns
const WALL_ROWS            = 25;     // Grid rows
const WALL_ROTATION_HOURS  = 4;      // Oldest granted wishes rotate out after 4 hours

/* ============================================================
   WISH QUEUE SYSTEM
   The wall must NEVER sit empty. When a wish is granted:
   1. The granted wish stays visible (green tick) for 4 hours
   2. Admin marks it granted in the dashboard
   3. The next wish in the queue auto-promotes to 'approved'
   4. The wall immediately fills the slot

   Queue priority: oldest submission first (FIFO).
   In Firestore: wishes with status='queued' ordered by createdAt asc.
   In demo mode: QUEUE_DEMO array feeds the wall automatically.
   ============================================================ */
const QUEUE_CHECK_INTERVAL = 30000; // Check queue every 30 seconds
window._wishQueue = []; // Populated from Firestore or demo data

// Called when admin grants a wish - promotes next in queue
window.promoteNextFromQueue = async function(grantedWishId){
  if(window._firebaseReady && window._col){
    try {
      // Get oldest queued wish
      const { query, where, orderBy, limit, getDocs, updateDoc, doc } = window._fb;
      const queueQ = query(
        window._col.wishes,
        where('status','==','queued'),
        orderBy('createdAt','asc'),
        limit(1)
      );
      const snap = await getDocs(queueQ);
      if(!snap.empty){
        const nextWish = snap.docs[0];
        await updateDoc(doc(window._db,'wishes',nextWish.id), {
          status: 'approved',
          promotedAt: new Date().toISOString(),
          promotedFrom: 'queue'
        });
        console.log('Queue: promoted wish ' + nextWish.id + ' to wall');
      }
    } catch(e){ console.warn('Queue promotion error:', e); }
  } else {
    // Demo mode: rotate demo wishes
    if(window._demoQueue && window._demoQueue.length > 0){
      const next = window._demoQueue.shift();
      next.status = 'approved';
      window.allWishes.push(next);
      window.renderWishes(window.allWishes);
    }
  }
};

// Auto-check: if wall has fewer than WALL_CAPACITY active wishes, pull from queue
window.autoFillFromQueue = function(){
  if(!window._firebaseReady) return;
  const active = window.allWishes.filter(w => w.status === 'approved' || w.status === 'granted').length;
  const deficit = WALL_CAPACITY - active;
  if(deficit > 0){
    // Promote up to 'deficit' wishes from queue
    for(let i = 0; i < Math.min(deficit, 20); i++){
      window.promoteNextFromQueue(null);
    }
  }
};

/* ============================================================
   GEOLOCATION  -  IP-based country detection
   ============================================================ */
window._userGeo = { country: '', countryCode: '', flag: '🌍', detected: false };

async function detectUserCountry(){
  try {
    const res  = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(3000) });
    const data = await res.json();
    if(data && data.country_name){
      const flagMap = {
        'GB':'🇬🇧','US':'🇺🇸','CA':'🇨🇦','AU':'🇦🇺','DE':'🇩🇪','FR':'🇫🇷',
        'NL':'🇳🇱','SE':'🇸🇪','ES':'🇪🇸','PL':'🇵🇱','ZA':'🇿🇦','NG':'🇳🇬',
        'GH':'🇬🇭','KE':'🇰🇪','BR':'🇧🇷','IN':'🇮🇳','IT':'🇮🇹','PT':'🇵🇹',
        'NZ':'🇳🇿','IE':'🇮🇪','SG':'🇸🇬','JP':'🇯🇵','MX':'🇲🇽','AR':'🇦🇷',
        'CO':'🇨🇴','PH':'🇵🇭',
      };
      window._userGeo = {
        country:     data.country_name,
        countryCode: data.country,
        flag:        flagMap[data.country] || '🌍',
        city:        data.city || '',
        detected:    true,
      };
      // Set regional pricing based on detected country
      window._pricingTier = getRegionalTier(data.country);
      // Update price displays
      document.querySelectorAll('.dynamic-price').forEach(el => {
        el.textContent = window._pricingTier.display;
      });
      const countryDisplay = document.getElementById('modal-user-country');
      if(countryDisplay){
        const priceNote = window._pricingTier.price < 1.99 ? ` (regional price: ${window._pricingTier.display})` : '';
        countryDisplay.textContent = `${window._userGeo.flag} Pinning from ${data.country_name}${priceNote}`;
      }
    }
  } catch(e) {
    // Silently fail  -  geolocation is enhancement only
  }
}
detectUserCountry();

/* Seeded shuffle  -  same scatter every load */
function seededShuffle(arr, seed){
  const a = [...arr]; let s = seed;
  for(let i=a.length-1;i>0;i--){
    s=(s*1664525+1013904223)&0xffffffff;
    const j=Math.abs(s)%(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ============================================================
   PARTICLE SYSTEM
   ============================================================ */
let canvas, ctx, particles = [];

function initParticleSystem(){
  canvas = document.getElementById('px-canvas');
  if(!canvas) return;
  ctx = canvas.getContext('2d');

  function resizeCanvas(){
    if(!canvas) return;
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

class Particle{
  constructor(){ this.reset(true); }
  reset(initial){
    this.x   = Math.random() * canvas.width;
    this.y   = initial ? Math.random() * canvas.height : canvas.height + 20;
    this.sz  = Math.random() * 3.5 + 1;
    this.vy  = -(Math.random() * 0.55 + 0.18);
    this.vx  = (Math.random() - .5) * .35;
    this.op  = Math.random() * .45 + .1;
    this.col = ['#FFE566','#FF4D8D','#00D4FF','#00FFB3','#FF7B2C','#B44DFF'][Math.floor(Math.random()*6)];
    this.isCirc = Math.random() > .45;
  }
  step(){ this.y += this.vy; this.x += this.vx; this.op -= .00045; if(this.y < -20 || this.op <= 0) this.reset(false); }
  draw(){
    ctx.save(); ctx.globalAlpha = this.op; ctx.fillStyle = this.col;
    if(this.isCirc){ ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, Math.PI*2); ctx.fill(); }
    else { ctx.font = `${this.sz*3}px serif`; ctx.fillText('✦', this.x, this.y); }
    ctx.restore();
  }
}

  function initPx(){ resizeCanvas(); particles = Array.from({length:55}, () => new Particle()); }
  function animPx(){ if(!ctx) return; ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.step(); p.draw(); }); requestAnimationFrame(animPx); }
  window.addEventListener('resize', resizeCanvas);
  initPx(); animPx();
} // end initParticleSystem

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initParticleSystem);
} else {
  initParticleSystem();
}

// Re-paint when switching back to wall tab without losing data
const _origShowTab = window.showTab;
function showTab(tab){
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
  const el = document.getElementById('tab-'+tab);
  if(el) el.classList.add('active');
  document.querySelectorAll(`[data-tab="${tab}"]`).forEach(b => b.classList.add('active'));
  window.scrollTo({top:0, behavior:'smooth'});
  // Restore wall if we have data
  if(tab === 'wall' && window._lastWishes && window._lastWishes.length > 0 && window.allWishes.length === 0){
    allWishes = window._lastWishes;
    window.allWishes = allWishes;
    paintWall();
  }
}

function paintWall(){
  const grid = document.getElementById('wall-grid');
  let src = allWishes;

  if(curFilter === 'granted') src = src.filter(w => w.status === 'granted');
  else if(curFilter === 'live') src = src.filter(w => w.status !== 'granted');

  if(searchQ){
    const q = searchQ.toLowerCase();
    src = src.filter(w => w.wishText.toLowerCase().includes(q));
  }

  const isFiltering = curFilter !== 'all' || searchQ;

  if(isFiltering){
    grid.innerHTML = src.length
      ? src.map((w,i) => noteHTML(w,i)).join('')
      : '<div class="wall-empty" style="grid-column:1/-1">✨ No wishes found matching that search.</div>';
    document.getElementById('wall-full-msg').classList.remove('show');
    return;
  }

  const total  = allWishes.length;
  const VISIBLE = Math.min(total + 50, WALL_CAPACITY);
  const isFull = total >= WALL_CAPACITY;

  document.getElementById('wall-full-msg').classList.toggle('show', total >= WALL_CAPACITY);
  if(isFull) triggerWallFull();

  const counter = document.getElementById('spot-counter');
  if(counter) counter.textContent = `${total.toLocaleString()} wishes pinned${total >= WALL_CAPACITY ? '  -  FULL!' : ' (1,000 spots)'}` ;

  // Build slot map across all 1,000 positions
  const slotMap = new Array(WALL_CAPACITY).fill(null);
  allWishes.forEach((w, i) => {
    const slot = (w._slot !== undefined && w._slot < WALL_CAPACITY) ? w._slot : i % WALL_CAPACITY;
    if(!slotMap[slot]) slotMap[slot] = w;
  });
  // Fill remaining slots with ghost placeholder notes so the wall is always full
  const ghostTexts = [
    'Hoping for a little kindness today ✨','Wishing for something small but meaningful 💛',
    'Sending good vibes to whoever reads this 🌟','A quiet wish for better days ahead 🙏',
    'Just holding on and hoping 🌿','Dreams are free  -  and so is this wish 💫',
    'One day at a time  -  today I wish for peace ☀️','Quietly hopeful 🌸',
    'Wishing for warmth on a cold day 🕯️','A small wish from a grateful heart 💜',
    'Here because someone somewhere cares ❤️','Pinned with hope and nothing else 🌈',
    'Wishing for a breakthrough today 🚀','Grateful to exist on this wall 🌙',
    'A wish whispered into the universe ✨','Holding space for something good 💛',
    'Somewhere someone is reading this  -  thank you 🙏','One wish at a time 🌟',
    'Kindness travels in circles 💞','Every wish matters, even the quiet ones 🕊️',
  ];
  const ghostColors = ['n-yellow','n-pink','n-blue','n-green','n-orange','n-lav'];
  const ghostPins   = ['pin-r','pin-b','pin-g','pin-y'];
  const ghostRots   = [-2,-1,0,1,2,-1.5,1.5];
  for(let i=0; i<WALL_CAPACITY; i++){
    if(!slotMap[i]){
      slotMap[i] = {
        id: 'ghost-'+i,
        wishText: ghostTexts[i % ghostTexts.length],
        status: 'ghost',
        color: ghostColors[(i*7+3) % ghostColors.length],
        _ghost: true,
        _pinCls: ghostPins[(i*3+1) % ghostPins.length],
        _rot: ghostRots[(i*5+2) % ghostRots.length],
      };
    }
  }

  /*
     Mosaic: compute tile column/row for each slot position
     so each note carries its fragment of the composite image.
     Column 0-24 (left-right), Row 0-19 (top-bottom)
  */
  const cells = slotMap.map((w, i) => {
    const col = i % WALL_COLS;
    const row = Math.floor(i / WALL_COLS);
    const tilePosX = -(col * TILE_W);
    const tilePosY = -(row * TILE_H);
    const tileStyle = MOSAIC_IMAGE_URL
      ? `--tile-fragment:url('${MOSAIC_IMAGE_URL}');--tile-pos:${tilePosX}px ${tilePosY}px;`
      : '';
    return w
      ? noteHTML(w, i, tileStyle)
      : `<div class="note-spot has-tile" style="${tileStyle}" onclick="openModal()" title="Spot ${i+1}  -  pin your wish here!"><span class="spot-num">${i+1}</span></div>`;
  });
  grid.innerHTML = cells.join('');
}

function noteHTML(w, i, tileStyle=''){
  const color   = w.color || NOTE_COLS[i % NOTE_COLS.length];
  const pinCls  = PIN_COLS[i % PIN_COLS.length];
  const rot     = ROTS[i % ROTS.length];
  const delay   = Math.min(i * 0.008, 1.2).toFixed(2);
  const granted = w.status === 'granted';

  let dateStr = '';
  try{
    const d = w.createdAt?.toDate ? w.createdAt.toDate() : (w.createdAt ? new Date(w.createdAt) : null);
    if(d) dateStr = d.toLocaleDateString('en-US',{day:'numeric',month:'short'});
  }catch(_){}

  const stampHtml = (w.stamp && STAMPS[w.stamp])
    ? `<span class="wish-stamp ${STAMPS[w.stamp].cls}">${STAMPS[w.stamp].txt}</span>`
    : '';

  const grantedBadge = granted ? `<span class="granted-badge">✅😊</span>` : '';
  const connectDot   = w.isConnect ? `<span style="font-size:6px;color:rgba(0,180,220,.8);">🤝</span>` : '';

  // Encode wish data for click handler  -  safe serialisation
  const safeId = esc(w.id);

  if(w._ghost){
    return `<div class="note-card ${w.color}" style="--rot:${w._rot}deg;opacity:.55;pointer-events:none;" aria-hidden="true">
  <div class="note-inner"><div class="note-pin ${w._pinCls}"></div>
  <p class="note-text" style="font-size:8px;opacity:.7;">${esc(w.wishText)}</p></div></div>`;
  }

  const statusCls = granted ? 'is-granted is-real' : 'is-real';
  return `
<div class="note-card ${color} ${statusCls}"
     style="--rot:${rot}deg;${tileStyle}"
     data-id="${safeId}"
     onclick="openWishDetail('${safeId}')"
     role="button" tabindex="0" aria-label="${granted ? 'Granted wish - click to read' : 'Active wish - click to read'}">
  <div class="note-inner">
    <div class="note-pin ${pinCls}"></div>
    ${stampHtml}
    <p class="note-text">${esc(w.wishText)}</p>
    <div class="note-footer">
      ${w.country ? `<span class="note-country">${esc(w.country)}</span>` : ''}
      ${grantedBadge}${connectDot}
    </div>
  </div>
</div>`;
}

function esc(str=''){
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

  // Paint the detail card with the correct note colour

  } else {

  // Wish text

  // Cheeky response

  if(w.cheekyResponse){

    cheekyEl.style.display = '';
  } else {

  }

  // Country
  document.getElementById('wish-detail-country').textContent = w.country || '';

  // Date
  document.getElementById('wish-detail-date').textContent = dateStr;

  // Status badge
  const statusEl = document.getElementById('wish-detail-status');
  if(granted){
    statusEl.innerHTML = '<span class="wish-detail-granted">✅😊 Granted</span>';
  } else {
    statusEl.innerHTML = '';
  }

  // Connection badge
  const connectEl = document.getElementById('wish-detail-connect');
  if(w.isConnect){
    connectEl.innerHTML = '<span class="wish-detail-connect">🤝 We\'ll connect</span>';
  } else {
    connectEl.innerHTML = '';
  }

  // Sponsor button  -  only for non-granted wishes with a cost
  const sponsorBtn = document.getElementById('wish-detail-sponsor');
  if(!granted && w.est && w.est > 0){
    sponsorBtn.style.display = '';
    sponsorBtn.textContent = `💙 Sponsor this wish  -  ~$${w.est}`;
    sponsorBtn.onclick = () => { closeWishDetail(); sponsorWish(w.id); };
  } else if(!granted){

    sponsorBtn.textContent = '💙 Sponsor this wish';
    sponsorBtn.onclick = () => { closeWishDetail(); sponsorWish(w.id); };
  } else {
    sponsorBtn.style.display = 'none';
  }

  // Card rotation  -  match the note's rotation
  const idx = allWishes.indexOf(w);
  const rot = ROTS[idx % ROTS.length];
  document.getElementById('wish-detail-card').style.transform = `scale(1) rotate(${rot}deg) translateY(0)`;

  document.getElementById('wish-detail-ov').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function animNum(id, target){
  const el = document.getElementById(id);
  if(!el) return;
  const start = parseInt(el.textContent.replace(/\D/g,'')) || 0;
  const t0 = performance.now();
  function tick(now){
    const p = Math.min((now-t0)/650, 1);
    const e = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(start + (target-start)*e);
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function sponsorWish(id){
  const amtStr = prompt('How much would you like to contribute? (WishCoins)\nMinimum 1 WC = $1 USD');
  if(!amtStr) return;
  const amtFloat = parseFloat(amtStr);
  if(isNaN(amtFloat) || amtFloat < 1){ alert('Please enter a valid amount of at least 1 WishCoin ($1 USD).'); return; }
  const amtPence = Math.round(amtFloat * 100);

  try{
    const res  = await fetch('/.netlify/functions/create-sponsor-session', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ wishId: id, amount: amtPence })
    });
    const data = await res.json();
    if(data.url){ window.location.href = data.url; }
    else { throw new Error(data.error || 'No checkout URL returned'); }
  } catch(err){
    console.error('sponsorWish error:', err);
    alert('Something went wrong connecting to Stripe. Please try again shortly.');
  }
}

/* ============================================================
   SUBMIT WISH -> FIREBASE + STRIPE
   ============================================================ */
async function submitWish(){
  const wishTxt  = document.getElementById('f-wish').value.trim();
  const name     = document.getElementById('f-name').value.trim();
  const email    = document.getElementById('f-email').value.trim();
  const anon     = document.getElementById('f-anon').checked;
  const idConfirm= document.getElementById('f-id-confirm').checked;
  const btn      = document.getElementById('sub-btn');
  const refCode  = (document.getElementById('f-refcode')?.value || '').trim().toUpperCase();

  if(!wishTxt){ shake(document.getElementById('f-wish')); return alert('✨ Please write your wish!'); }
  if(wishTxt.length > 200){ return alert('Keep your wish under 200 characters!'); }
  if(!name){ shake(document.getElementById('f-name')); return alert('Your full name is required  -  it stays private and is used for verification only.'); }
  if(!email || !email.includes('@')){ shake(document.getElementById('f-email')); return alert('We need a valid email to notify you when your wish is granted 💌'); }
  if(!idConfirm){ return alert('Please confirm that your name matches your government-issued ID to continue. This protects everyone on the wall.'); }
  if(hasProfanity(wishTxt)){ return alert('Please keep the magic family-friendly! 🌟'); }

  // 3-per-year limit (client-side; server validates too)
  const yearKey  = `ww-wishes-${new Date().getFullYear()}`;
  const thisYear = JSON.parse(localStorage.getItem(yearKey) || '[]');
  if(thisYear.length >= 3){
    return alert('✨ You\'ve already pinned 3 wishes this year  -  that\'s the magic limit!\n\nYour wishes reset in January. Share your referral code to earn WishCredits in the meantime!');
  }

  btn.disabled    = true;
  btn.textContent = '✨ Saving your wish...';
  storedWishTxt   = wishTxt;

  const wishData = {
    wishText:    wishTxt,
    name:        name,
    displayName: anon ? '' : name,
    email,
    anonymous:   anon,
    idConfirmed: true,
    cat:         _selectedCat || 'other',
    status:      'queued',  // Starts queued; auto-promotes when wall has space
    color:       NOTE_COLS[Math.floor(Math.random() * NOTE_COLS.length)],
    country:     window._userGeo?.detected
                   ? `${window._userGeo.flag} ${window._userGeo.country}`
                   : '🌍 Global',
    countryCode: window._userGeo?.countryCode || 'XX',
    referralCode:refCode || null,
    wcCost:      window._pricingTier?.price || WC_PIN_COST,
    priceTier:   window._pricingTier?.tier || 'TIER_1',
    queuedAt:    new Date().toISOString(),
  };
  // If wall has space, promote directly to approved (skip queue)
  const activeCount = window.allWishes.filter(w =>
    w.status === 'approved' || w.status === 'granted'
  ).length;
  if(activeCount < WALL_CAPACITY){
    wishData.status = 'approved';
    wishData.promotedFrom = 'direct';
  }

  try {
    if(window._firebaseReady && window.saveWish){
      const docRef = await window.saveWish(wishData);
      const wishId = docRef.id;
      thisYear.push({ id: wishId, date: Date.now() });
      localStorage.setItem(yearKey, JSON.stringify(thisYear));
      const myCode = generateRefCode(email);
      localStorage.setItem('ww-mycode', myCode);
      window.location.href = `${STRIPE_PAYMENT_LINK}?client_reference_id=${wishId}&prefilled_email=${encodeURIComponent(email)}`;
    } else {
      // Demo mode  -  skip payment
      thisYear.push({ id: 'demo-' + Date.now(), date: Date.now() });
      localStorage.setItem(yearKey, JSON.stringify(thisYear));

/* Referral fraud prevention:
   - Max 10 referrals per month, 50 lifetime (per audit)
   - 7-day maturation period before credits release
   - IP-based limiting handled server-side via Netlify function
*/
const REFERRAL_MONTHLY_CAP  = 10;
const REFERRAL_LIFETIME_CAP = 50;
const REFERRAL_MATURE_DAYS  = 7;

function checkReferralCap(){
  const monthKey = 'ww-refs-' + new Date().toISOString().slice(0,7);
  const lifetimeKey = 'ww-refs-total';
  const monthly   = parseInt(localStorage.getItem(monthKey) || '0');
  const lifetime  = parseInt(localStorage.getItem(lifetimeKey) || '0');
  return { monthly, lifetime, canRefer: monthly < REFERRAL_MONTHLY_CAP && lifetime < REFERRAL_LIFETIME_CAP };
}

function generateRefCode(seed){
  let h = 0;
  for(let i=0;i<seed.length;i++) h = (Math.imul(31,h)+seed.charCodeAt(i))|0;
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code=''; let n = Math.abs(h);
  for(let i=0;i<5;i++){ code += chars[n % chars.length]; n = Math.floor(n/chars.length)||1; }
  return code;
}

function animLiveNum(id, target, prefix='', suffix='', duration=900){
  const el = document.getElementById(id);
  if(!el) return;
  const raw   = el.textContent.replace(/[^0-9]/g,'');
  const start = parseInt(raw) || 0;
  const t0    = performance.now();
  function tick(now){
    const p = Math.min((now-t0)/duration, 1);
    const e = 1 - Math.pow(1-p, 3);
    const val = Math.round(start + (target-start)*e);
    el.textContent = prefix + val.toLocaleString('en-US') + suffix;
    if(p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function triggerWallFull(){
  if(wallFullActive) return;
  const storedTs = localStorage.getItem('ww-wall-full-ts');
  const now = Date.now();
  if(storedTs && (now - parseInt(storedTs)) > WALL_ROTATION_HOURS * 3600 * 1000){
    clearWallAfterFull(); return;
  }
  if(!storedTs) localStorage.setItem('ww-wall-full-ts', String(now));
  showWallFullOverlay();

function showWallFullOverlay(){
  wallFullActive = true;
  const overlay = document.getElementById('wall-full-overlay');
  overlay.classList.add('show');
  buildHeartGrid();
  startCountdown();
  notifyWallFull();

function buildHeartGrid(){
  const g = document.getElementById('wfo-grid');
  g.innerHTML = '';
  let idx = 0;
  HEART_MAP.forEach(row => {
    row.forEach(cell => {
      const el = document.createElement('div');
      el.className = 'wfo-cell';
      if(cell){
        const col = HEART_COLS[idx % HEART_COLS.length];
        el.style.background = col;
        el.style.boxShadow  = `0 0 6px ${col}88`;
        setTimeout(() => el.classList.add('lit'), idx * 4);
        idx++;
      } else {
        el.style.background = 'transparent';
        el.classList.add('lit');
      }
      g.appendChild(el);
    });
  });
}

function startCountdown(){
  const storedTs = parseInt(localStorage.getItem('ww-wall-full-ts') || String(Date.now()));
  const endTime  = storedTs + WALL_ROTATION_HOURS * 3600 * 1000;

  function tick(){
    const remaining = Math.max(endTime - Date.now(), 0);
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const el = document.getElementById('wfo-countdown');
    if(el) el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(remaining <= 0){ clearInterval(countdownTimer); clearWallAfterFull(); }
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

  localStorage.removeItem('ww-wall-full-ts');

/* ============================================================
   SMART POT BALANCER (internal  -  runs silently)
   Sort unfunded wishes by est cost ASC. Fund cheapest first.
   Oldest of top 20 gets priority if it's been 30+ days.
   ============================================================ */
function runPotBalancer(potBalance, wishes){
  if(!wishes || !wishes.length) return null;
  const unfunded = wishes
    .filter(w => w.status === 'approved' && !w.granted)
    .map(w => ({...w, _est: w.est || 999999, _age: w.createdAt ? (Date.now() - (w.createdAt?.toMillis?.() || w.createdAt?.seconds*1000 || 0)) : 0 }))
    .sort((a,b) => a._est - b._est);
  if(!unfunded.length) return null;
  const top20 = unfunded.slice(0, 20);
  const thirtyDays = 30 * 24 * 3600 * 1000;
  const oldestUrgent = top20.find(w => w._age > thirtyDays);
  const candidate = oldestUrgent || unfunded[0];
  if(candidate._est <= potBalance) return { wishId: candidate.id, cost: candidate._est, wishText: candidate.wishText };
  return null;
}
window._runPotBalancer = runPotBalancer;

function buildKindnessGrid(){
  const grid = document.getElementById('kindness-grid');
  if(!grid) return;
  grid.innerHTML = KINDNESS_ACTS.map((k, i) => `
    <div class="kindness-card ${k.theme}" onclick="openKindnessCard(${i})" tabindex="0" role="button" aria-label="${k.title}">
      <div class="kc-era">${k.era}</div>
      <span class="kc-emoji">${k.emoji}</span>
      <div class="kc-title">${k.title}</div>
      <div class="kc-preview">${k.preview}</div>
      <div class="kc-read">Tap to read the full story -></div>
    </div>`).join('');
}

let activeKindnessIdx = -1;

function openKindnessCard(idx){
  const k = KINDNESS_ACTS[idx];
  if(!k) return;

  // Update card active state
  document.querySelectorAll('.kindness-card').forEach((c,i) => {
    c.classList.toggle('active', i === idx);
  });

  const detail = document.getElementById('kindness-detail');
  document.getElementById('kd-era').textContent = k.era;
  document.getElementById('kd-title').textContent = k.title;
  document.getElementById('kd-body').textContent = k.body;
  document.getElementById('kd-lesson').innerHTML = '&#x1F4A1; ' + k.lesson;

  detail.style.display = 'block';
  detail.scrollIntoView({ behavior:'smooth', block:'nearest' });
  activeKindnessIdx = idx;
}

function closeKindnessCard(){
  document.getElementById('kindness-detail').style.display = 'none';
  document.querySelectorAll('.kindness-card').forEach(c => c.classList.remove('active'));
  activeKindnessIdx = -1;
}
